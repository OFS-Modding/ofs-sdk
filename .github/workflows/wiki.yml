name: Wiki

on:
  push:
    branches: [main]
    paths:
      - 'docs/wiki/**'
      - '.github/workflows/wiki.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [[ "$(gh api "repos/${GITHUB_REPOSITORY}" --jq '.has_wiki')" != "true" ]]; then
            echo "::notice::Wiki hosting is unavailable; docs/wiki remains authoritative."
            exit 0
          fi
          url="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git"
          git clone "$url" "$RUNNER_TEMP/wiki"
          find "$RUNNER_TEMP/wiki" -maxdepth 1 -type f -name '*.md' -delete
          cp docs/wiki/*.md "$RUNNER_TEMP/wiki/"
          git -C "$RUNNER_TEMP/wiki" config user.name github-actions[bot]
          git -C "$RUNNER_TEMP/wiki" config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git -C "$RUNNER_TEMP/wiki" add -A
          git -C "$RUNNER_TEMP/wiki" diff --cached --quiet && exit 0
          git -C "$RUNNER_TEMP/wiki" commit -m "Synchronize SDK wiki"
          git -C "$RUNNER_TEMP/wiki" push origin master
